<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      * {
        font-family: 'Geist', sans-serif;
      }
    </style>
  </head>
  <body>
    <header class="bg-slate-100">
      <nav class="flex justify-between w-11/12 mx-auto py-6 items-center">
        <div class="flex items-center gap-2">
          <img class="h-8" src="./assets/github-logo.png" alt="" />
          <p class="text-2xl font-semibold">GitHub Issues Tracker</p>
        </div>
        <div class="join">
          <div>
            <label class="input validator join-item">
              <i class="fa-solid fa-magnifying-glass"></i>
              <input type="text" placeholder="Search issues..." required />
            </label>
          </div>
          <button class="btn bg-blue-500 join-item">+New Issue</button>
        </div>
      </nav>
    </header>

    <main class="container mx-auto">
      <div class="mt-14 bg-slate-200 py-4 space-x-2">
        <button id="all-Btn" class="btn px-10 ml-4">All</button>
        <button id="open-Btn" class="btn px-10">Open</button>
        <button id="closed-Btn" class="btn px-10">Closed</button>
      </div>
      <div
        class="mt-14 bg-slate-200 py-4 space-x-2 flex justify-between px-4 items-center"
      >
        <div class="">
          <div class="flex">
            <img
              class="p-2 rounded-full bg-indigo-200 mr-3 h-14"
              src="./assets/Aperture.png"
              alt=""
            />
            <div class="">
              <p class="text-2xl font-semibold">
                <span class="pr-3">0</span>Issues
              </p>
              <p class="text-xl text-gray-500">
                Track and manage your project issues
              </p>
            </div>
          </div>
        </div>
        <div class="flex space-x-2 items-center">
          <div class="p-2 rounded-full h-4 bg-blue-600"></div>
          <div class="pr-4 font-medium">Open</div>
          <div class="p-2 rounded-full h-4 bg-[#A855F7]"></div>
          <div class="font-medium">Closed</div>
        </div>
      </div>

      <section id="issue-container" class="mt-10 grid grid-cols-4 space-y-3 space-x-3">
        <!-- <div
          class="p-5 border-t-5 border-green-600 rounded-2xl bg-slate-500 max-w-100 space-y-3"
        >
          
        </div> -->
      </section>
    </main>

    <script src="home.js"></script>
  </body>
</html>
